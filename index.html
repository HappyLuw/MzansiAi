<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mzansi AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #F0F7F4; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    ::-webkit-scrollbar { width: 0; }
    textarea::placeholder { color: #aaa; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const languages = [
      { code: "en", name: "English", native: "English", flag: "🇬🇧", greeting: "Hello! Welcome to Mzansi AI. How can I help you today?" },
      { code: "zu", name: "Zulu", native: "isiZulu", flag: "🇿🇦", greeting: "Sawubona! Wugenini ku Mzansi AI. Ngingakusiza kanjani namuhla?" },
      { code: "xh", name: "Xhosa", native: "isiXhosa", flag: "🇿🇦", greeting: "Molo! Croissant ku Mzansi AI. Ndingakunceda njani namhlanje?" },
      { code: "af", name: "Afrikaans", native: "Afrikaans", flag: "🇿🇦", greeting: "Hallo! Welkom bij Mzansi AI. Hoe kan ek jou vandag help?" },
      { code: "nso", name: "Northern Sotho", native: "Sepedi", flag: "🇿🇦", greeting: "Thobela! Moswelcome go Mzansi AI. Nka go thuša bjang lehono?" },
      { code: "tn", name: "Tswana", native: "Setswana", flag: "🇿🇦", greeting: "Dumela! Ke a go amogela go Mzansi AI. Nka go thusa jang gompieno?" },
      { code: "st", name: "Southern Sotho", native: "Sesotho", flag: "🇿🇦", greeting: "Dumela! Ke a ho amohela ho Mzansi AI. Nka u thusa joang kajeno?" },
      { code: "ts", name: "Tsonga", native: "Xitsonga", flag: "🇿🇦", greeting: "Avuxeni! Ke a mi amogela go Mzansi AI. Ndzi nga mi pfuna njhani namuntlha?" },
      { code: "ss", name: "Swati", native: "siSwati", flag: "🇿🇦", greeting: "Sawubona! Wugenini ku Mzansi AI. Ngingakusita kanjani lamuhla?" },
      { code: "ve", name: "Venda", native: "Tshivenda", flag: "🇿🇦", greeting: "Ndaa! Ndi a mu amugomela go Mzansi AI. Ndi nga ni thusa hani namusi?" },
      { code: "nr", name: "Ndebele", native: "isiNdebele", flag: "🇿🇦", greeting: "Lotjhani! Wugenini ku Mzansi AI. Ngingakusiza njani lamuhla?" }
    ];

    const quickActions = [
      { icon: "🎭", label: "SA Culture", question: "Tell me about South African culture and traditions." },
      { icon: "🍲", label: "Recipes", question: "What are some traditional South African recipes I can make at home?" },
      { icon: "📚", label: "Phrases", question: "Teach me some common greetings and phrases in my selected language." },
      { icon: "🏛️", label: "History", question: "Give me an overview of South African history." }
    ];

    function MzansiAI() {
      const [selectedLang, setSelectedLang] = useState(null);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);
      const inputRef = useRef(null);
      const historyRef = useRef([]);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const selectLanguage = (lang) => {
        setSelectedLang(lang);
        setDrawerOpen(false);
        setMessages([{ role: "ai", text: lang.greeting }]);
        historyRef.current = [];
      };

      const send = async (text) => {
        const msg = (text || input).trim();
        if (!msg || !selectedLang || loading) return;
        setInput("");
        setMessages((prev) => [...prev, { role: "user", text: msg }]);
        setLoading(true);

        historyRef.current.push({ role: "user", content: msg });

        try {
          const sys = `You are Mzansi AI, a helpful assistant built specifically for South Africans. You must respond ONLY in ${selectedLang.name} (${selectedLang.native}).
- Be culturally aware of South African contexts, traditions, food, music, sports, and daily life.
- Use warm, natural language. Embody the spirit of Ubuntu.
- Keep replies concise and friendly (2–3 short paragraphs max).
- If the user writes in a different language, gently respond in ${selectedLang.name} anyway.
- If you are less confident in ${selectedLang.name}, still try your best and stay helpful.`;

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: sys,
              messages: historyRef.current
            })
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || "Apologies, something went wrong. Please try again.";
          historyRef.current.push({ role: "assistant", content: reply });
          setMessages((prev) => [...prev, { role: "ai", text: reply }]);
        } catch {
          setMessages((prev) => [...prev, { role: "ai", text: "Sorry, an error occurred. Please try again." }]);
        }
        setLoading(false);
      };

      const colors = {
        orange: "#2E7D5E",
        red: "#1B5E42",
        gold: "#48A999",
        pink: "#66BB9A",
        blue: "#2980B9",
        green: "#27AE60",
        cream: "#F0F7F4",
        dark: "#1C3530"
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: colors.cream, fontFamily: "'Segoe UI', sans-serif", color: colors.dark, overflow: "hidden", maxWidth: 520, margin: "0 auto", width: "100%", position: "relative" }}>

          {/* Header */}
          <div style={{ background: `linear-gradient(135deg, ${colors.orange}, ${colors.red})`, color: "#fff", padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 8px rgba(0,0,0,0.18)", zIndex: 10, flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 28 }}>🇿🇦</span>
              <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.5px" }}>Mzansi AI</span>
            </div>
            <button onClick={() => setDrawerOpen(true)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, width: 38, height: 38, fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>☰</button>
          </div>

          {/* Language Badge */}
          {selectedLang && (
            <div style={{ background: "#fff", borderBottom: `1px solid rgba(230,126,34,0.25)`, padding: "8px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
              <span style={{ fontSize: 13, color: "#666" }}>
                Chatting in <strong style={{ color: colors.orange }}>{selectedLang.native}</strong>
              </span>
              <button onClick={() => setDrawerOpen(true)} style={{ background: "none", border: `1px solid ${colors.orange}`, color: colors.orange, borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Change</button>
            </div>
          )}

          {/* Drawer Overlay */}
          {drawerOpen && <div onClick={() => setDrawerOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 98 }} />}

          {/* Language Drawer */}
          <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: "80%", maxWidth: 340, background: "#fff", boxShadow: "-4px 0 24px rgba(0,0,0,0.18)", zIndex: 99, transform: drawerOpen ? "translateX(0)" : "translateX(100%)", transition: "transform .3s ease", display: "flex", flexDirection: "column" }}>
            <div style={{ background: `linear-gradient(135deg, ${colors.orange}, ${colors.red})`, color: "#fff", padding: "18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: 700, fontSize: 18 }}>🗣️ Choose Language</span>
              <button onClick={() => setDrawerOpen(false)} style={{ background: "none", border: "none", color: "#fff", fontSize: 24, cursor: "pointer", lineHeight: 1 }}>×</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: 12 }}>
              {languages.map((lang) => {
                const active = selectedLang?.code === lang.code;
                return (
                  <div key={lang.code} onClick={() => selectLanguage(lang)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 12, marginBottom: 8, cursor: "pointer", border: active ? `2px solid ${colors.orange}` : "2px solid #eee", background: active ? `linear-gradient(135deg, ${colors.orange}, ${colors.gold})` : "#fff", color: active ? "#fff" : colors.dark, transition: "all .2s" }}>
                    <span style={{ fontSize: 22 }}>{lang.flag}</span>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 15 }}>{lang.name}</div>
                      <div style={{ fontSize: 13, opacity: 0.75 }}>{lang.native}</div>
                    </div>
                    {active && <span style={{ marginLeft: "auto", fontSize: 18 }}>✓</span>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px 14px", display: "flex", flexDirection: "column", gap: 12 }}>

            {/* Welcome screen */}
            {!selectedLang && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: "2rem 1rem" }}>
                <div style={{ fontSize: 64, marginBottom: 12 }}>🇿🇦</div>
                <h1 style={{ fontSize: 26, fontWeight: 700, background: `linear-gradient(135deg, ${colors.orange}, ${colors.red})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 6 }}>Welcome to Mzansi AI</h1>
                <p style={{ color: "#666", fontSize: 14, marginBottom: 22, maxWidth: 300 }}>Your multilingual AI assistant — chat in any of South Africa's 11 official languages.</p>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, width: "100%", maxWidth: 340 }}>
                  {quickActions.map((a, i) => (
                    <div key={i} onClick={() => setDrawerOpen(true)} style={{ background: "#fff", border: "2px solid #eee", borderRadius: 14, padding: "16px 8px", textAlign: "center", cursor: "pointer", transition: "border .2s" }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = colors.orange}
                      onMouseLeave={e => e.currentTarget.style.borderColor = "#eee"}>
                      <div style={{ fontSize: 28 }}>{a.icon}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, marginTop: 4 }}>{a.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 22, background: "#fff", border: "2px solid #eee", borderRadius: 14, padding: "14px 16px", maxWidth: 340, width: "100%" }}>
                  <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>👆 Tap ☰ menu to pick your language</div>
                  <div style={{ fontSize: 13, color: "#777" }}>English, isiZulu, isiXhosa, Afrikaans & 7 more!</div>
                </div>
              </div>
            )}

            {/* Chat messages */}
            {selectedLang && messages.map((m, i) => {
              const isUser = m.role === "user";
              return (
                <div key={i} style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", gap: 8, alignItems: "flex-end" }}>
                  {!isUser && <div style={{ width: 34, height: 34, borderRadius: "50%", background: `linear-gradient(135deg, ${colors.orange}, ${colors.pink})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>🤖</div>}
                  <div style={{
                    maxWidth: "78%",
                    padding: "10px 14px",
                    borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                    background: isUser ? `linear-gradient(135deg, ${colors.blue}, #3498DB)` : "#fff",
                    color: isUser ? "#fff" : colors.dark,
                    border: isUser ? "none" : "1px solid #eee",
                    boxShadow: "0 1px 4px rgba(0,0,0,0.08)",
                    fontSize: 14,
                    lineHeight: 1.55,
                    whiteSpace: "pre-wrap",
                    wordBreak: "break-word"
                  }}>{m.text}</div>
                  {isUser && <div style={{ width: 34, height: 34, borderRadius: "50%", background: `linear-gradient(135deg, ${colors.blue}, #3498DB)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>👤</div>}
                </div>
              );
            })}

            {/* Typing indicator */}
            {loading && (
              <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", background: `linear-gradient(135deg, ${colors.orange}, ${colors.pink})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>🤖</div>
                <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: "18px 18px 18px 4px", padding: "12px 16px", display: "flex", gap: 5, alignItems: "center" }}>
                  {[0, 1, 2].map((n) => (
                    <div key={n} style={{ width: 8, height: 8, borderRadius: "50%", background: colors.orange, animation: `bounce 1.4s infinite ease-in-out both`, animationDelay: `${n * -0.16}s` }} />
                  ))}
                </div>
              </div>
            )}

            {/* Quick action pills after greeting */}
            {selectedLang && messages.length === 1 && !loading && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginTop: 4 }}>
                {quickActions.map((a, i) => (
                  <button key={i} onClick={() => send(a.question)} style={{ background: "#fff", border: `1.5px solid ${colors.orange}`, borderRadius: 20, padding: "7px 13px", fontSize: 13, fontWeight: 600, color: colors.orange, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, transition: "all .2s" }}
                    onMouseEnter={e => { e.currentTarget.style.background = colors.orange; e.currentTarget.style.color = "#fff"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "#fff"; e.currentTarget.style.color = colors.orange; }}>
                    <span>{a.icon}</span> {a.label}
                  </button>
                ))}
              </div>
            )}

            <div ref={bottomRef} />
          </div>

          {/* Input Bar */}
          {selectedLang && (
            <div style={{ background: "#fff", borderTop: "1px solid #eee", padding: "12px 14px", display: "flex", gap: 10, alignItems: "flex-end", flexShrink: 0 }}>
              <textarea
                ref={inputRef}
                value={input}
                onChange={(e) => { setInput(e.target.value); e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 110) + "px"; }}
                onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="Type a message..."
                rows={1}
                style={{ flex: 1, resize: "none", border: "2px solid #eee", borderRadius: 22, padding: "10px 16px", fontSize: 15, fontFamily: "inherit", outline: "none", minHeight: 44, maxHeight: 110, overflowY: "auto", lineHeight: 1.4 }}
                onFocus={e => e.target.style.borderColor = colors.orange}
                onBlur={e => e.target.style.borderColor = "#eee"}
              />
              <button onClick={() => send()} disabled={!input.trim() || loading} style={{ width: 46, height: 46, borderRadius: "50%", background: (!input.trim() || loading) ? "#ccc" : `linear-gradient(135deg, ${colors.orange}, ${colors.gold})`, border: "none", color: "#fff", fontSize: 20, cursor: (!input.trim() || loading) ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "background .2s", boxShadow: "0 2px 8px rgba(230,126,34,0.3)" }}>
                ➤
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MzansiAI />);
  </script>
</body>
</html>
